version: '3.9'

networks:
  alerting-net:
    driver: bridge

services:

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    networks: [alerting-net]
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=${KAFKA_NUM_PARTITIONS:-6}
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    networks: [alerting-net]
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    networks: [alerting-net]
    environment:
      - POSTGRES_DB=alerting
      - POSTGRES_USER=alerting
      - POSTGRES_PASSWORD=alerting
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alerting"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    networks: [alerting-net]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  config-server:
    build: ./config-server
    container_name: config-server
    networks: [alerting-net]
    environment:
      - CONFIG_GIT_URI=${CONFIG_GIT_URI}
      - CONFIG_GIT_TOKEN=${CONFIG_GIT_TOKEN}
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15

  backend:
    build: ./backend
    container_name: backend
    networks: [alerting-net]
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: frontend
    networks: [alerting-net]
    ports:
      - "3000:80"
    depends_on:
      - backend

  event-generator:
    build: ./event-generator
    container_name: event-generator
    networks: [alerting-net]
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - LOGIN_EVENTS_PER_MINUTE=6
      - WITHDRAWAL_EVENTS_PER_MINUTE=6
      - BET_EVENTS_PER_MINUTE=6
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  kafka-data:
  clickhouse-data:
  postgres-data:
  redis-data:
